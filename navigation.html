<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging — Station Navigation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1e2d45;
            --accent: #00e5ff;
            --accent2: #00ff9d;
            --warn: #ffb800;
            --danger: #ff3b5c;
            --text: #e8f0fe;
            --text-muted: #6b7fa3;
            --green: #00ff9d;
            --yellow: #ffb800;
            --red: #ff3b5c;
            --purple: #a855f7;
            --panel-width: 380px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
        }

        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-dot.green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
        .status-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
        .status-dot.red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
        .status-dot.purple { background: var(--purple); box-shadow: 0 0 6px var(--purple); }

        /* ── Main Layout ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Side Panel ── */
        .panel {
            width: var(--panel-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .panel-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* ── Search ── */
        .search-box { position: relative; }

        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        /* ── Filter tabs ── */
        .filter-tabs {
            display: flex;
            gap: 6px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: transparent;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .filter-tab.active, .filter-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,229,255,0.08);
        }

        /* ── Station List ── */
        .station-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .station-list::-webkit-scrollbar { width: 4px; }
        .station-list::-webkit-scrollbar-track { background: transparent; }
        .station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .station-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .station-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 0 2px 2px 0;
            background: var(--border);
            transition: background 0.2s;
        }

        .station-card.available::before    { background: var(--green); }
        .station-card.occupied::before     { background: var(--yellow); }
        .station-card.offline::before      { background: var(--red); }
        .station-card.maintenance::before  { background: var(--purple); }

        .station-card:hover, .station-card.selected {
            border-color: var(--accent);
            background: rgba(0,229,255,0.05);
        }

        .station-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .station-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }

        .station-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .badge-available    { background: rgba(0,255,157,0.15);   color: var(--green); }
        .badge-occupied     { background: rgba(255,184,0,0.15);   color: var(--yellow); }
        .badge-offline      { background: rgba(255,59,92,0.15);   color: var(--red); }
        .badge-maintenance  { background: rgba(168,85,247,0.15);  color: var(--purple); }

        .station-location {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .station-meta {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* ── Detail Panel ── */
        .detail-panel {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .detail-panel.active { display: flex; }

        .detail-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .detail-back:hover { opacity: 0.7; }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .detail-content::-webkit-scrollbar { width: 4px; }
        .detail-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .detail-station-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detail-location {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-top: 16px;
        }

        /* ── Travel Mode ── */
        .travel-modes {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }

        .travel-mode-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
        }

        .travel-mode-btn.active, .travel-mode-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,229,255,0.08);
        }

        /* ── Route Options ── */
        .route-option {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .route-option:hover, .route-option.selected {
            border-color: var(--accent);
            background: rgba(0,229,255,0.05);
        }

        .route-option.selected .route-badge {
            background: rgba(0,229,255,0.15);
            color: var(--accent);
        }

        .route-info { flex: 1; }

        .route-duration {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .route-distance {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .route-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--surface);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ── Navigate Button ── */
        .navigate-btn {
            margin: 16px 20px;
            padding: 13px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #0a0f1e;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }

        .navigate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,229,255,0.3);
        }

        .navigate-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Charger list (detail view) ── */
        .charger-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .charger-type {
            font-size: 13px;
            font-weight: 500;
        }

        .charger-detail {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .charger-price {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent2);
            font-family: 'Space Mono', monospace;
        }

        /* ── Map ── */
        #map {
            flex: 1;
            position: relative;
        }

        /* ── Loading ── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            gap: 16px;
        }

        .loading-spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 32px; margin-bottom: 10px; }
        .empty-text { font-size: 13px; line-height: 1.5; }

        /* ── Navigation Panel ── */
        .nav-panel {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .nav-panel.active { display: flex; }

        .nav-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(0,229,255,0.1), rgba(0,255,157,0.05));
        }

        .nav-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .nav-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .nav-end-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--danger);
            background: rgba(255,59,92,0.1);
            color: var(--danger);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .nav-end-btn:hover { background: rgba(255,59,92,0.2); }

        .nav-destination {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .nav-summary {
            display: flex;
            gap: 14px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .nav-summary span { display: flex; align-items: center; gap: 4px; }
        .nav-summary strong { color: var(--accent); font-family: 'Space Mono', monospace; }

        /* ── Steps ── */
        .nav-steps {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .nav-steps::-webkit-scrollbar { width: 4px; }
        .nav-steps::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .nav-step {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .nav-step.current {
            border-color: var(--accent);
            background: rgba(0,229,255,0.07);
        }

        .nav-step.passed { opacity: 0.4; }

        .step-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .nav-step.current .step-icon {
            background: rgba(0,229,255,0.15);
            border-color: var(--accent);
        }

        .step-body { flex: 1; }

        .step-instruction {
            font-size: 13px;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 3px;
        }

        .step-distance {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        /* ── Map Type Toggle ── */
        .map-type-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 9999;
            display: flex;
            gap: 4px;
            background: rgba(10,15,30,0.85);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px;
            backdrop-filter: blur(8px);
        }

        .map-type-btn {
            padding: 6px 12px;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .map-type-btn.active {
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .map-type-btn:hover:not(.active) {
            color: var(--text);
            background: var(--surface2);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 13px;
            color: var(--accent);
            z-index: 999;
            transition: transform 0.3s ease;
            font-family: 'Space Mono', monospace;
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Google Maps InfoWindow pill override ── */
        .gm-style .gm-style-iw-c {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
            border-radius: 999px !important;
            min-width: 0 !important;
        }
        .gm-style .gm-style-iw-d {
            overflow: visible !important;
            padding: 0 !important;
            border-radius: 999px !important;
        }
        .gm-style .gm-style-iw-tc { display: none !important; }
        .gm-style button.gm-ui-hover-effect { display: none !important; }
        .gm-style .gm-style-iw-chr { display: none !important; }

        /* ── Map reservation pill button ── */
        .map-reservation-pill {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0f1e;
            padding: 10px 24px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap;
            box-shadow: 0 4px 24px rgba(0,229,255,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            letter-spacing: 0.03em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .map-reservation-pill:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(0,229,255,0.65);
        }

        /* ── Reservation View ── */
        .reservation-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        /* ── Vehicle select cards ── */
        .vehicle-card {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vehicle-card:hover {
            border-color: var(--accent);
            background: rgba(0,229,255,0.05);
        }

        .vehicle-card.selected {
            border-color: var(--accent) !important;
            background: rgba(0,229,255,0.1) !important;
            box-shadow: 0 0 0 1px var(--accent);
        }

        .vehicle-card-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .vehicle-card-detail {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .vehicle-connector-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 8px;
            background: rgba(0,229,255,0.12);
            color: var(--accent);
            font-family: 'Space Mono', monospace;
        }

        /* ── Continue button ── */
        .continue-btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #0a0f1e;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
            margin-top: 8px;
        }

        .continue-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,229,255,0.3);
        }

        .continue-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Selectable charger cards ── */
        .res-charger-card {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .res-charger-card:hover:not(.unavailable) {
            border-color: var(--accent);
            background: rgba(0,229,255,0.05);
        }

        .res-charger-card.selected {
            border-color: var(--accent) !important;
            background: rgba(0,229,255,0.1) !important;
            box-shadow: 0 0 0 1px var(--accent);
        }

        .res-charger-card.unavailable {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Reservation form fields ── */
        .res-form-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .res-field { margin-bottom: 14px; }

        .res-field label {
            display: block;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 6px;
        }

        .res-field select,
        .res-field input[type="datetime-local"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            color-scheme: dark;
        }

        .res-field select:focus,
        .res-field input[type="datetime-local"]:focus { border-color: var(--accent); }

        /* ── Cost display box ── */
        .cost-box {
            background: rgba(0,229,255,0.06);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            text-align: center;
        }

        .cost-label {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 8px;
        }

        .cost-amount {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            color: var(--accent2);
            margin-bottom: 6px;
        }

        .cost-detail {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* ── Pay button ── */
        .pay-btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent2), #00c87a);
            border: none;
            color: #0a0f1e;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
            margin-top: 4px;
        }

        .pay-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,255,157,0.3);
        }

        .pay-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Selected charger banner ── */
        .selected-charger-banner {
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Selected vehicle banner ── */
        .selected-vehicle-banner {
            background: rgba(0,255,157,0.08);
            border: 1px solid rgba(0,255,157,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--accent2);
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">⚡</div>
        EV CHARGE NETWORK
    </div>
    <div class="header-status">
        <span><span class="status-dot green"></span>Available</span>
        <span><span class="status-dot yellow"></span>Occupied</span>
        <span><span class="status-dot red"></span>Offline</span>
        <span><span class="status-dot purple"></span>Maintenance</span>
    </div>
</header>

<div class="main">

    <div class="panel">

        <!-- Station List View -->
        <div id="listView" style="display:flex; flex-direction:column; height:100%;">
            <div class="panel-header">
                <div class="panel-title">Stations</div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search stations..." oninput="filterStations()">
                </div>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
                <button class="filter-tab" onclick="setFilter('available', this)">Available</button>
                <button class="filter-tab" onclick="setFilter('occupied', this)">Occupied</button>
                <button class="filter-tab" onclick="setFilter('offline', this)">Offline</button>
                <button class="filter-tab" onclick="setFilter('maintenance', this)">Maintenance</button>
            </div>
            <div class="station-list" id="stationList">
                <div class="loading-overlay" id="listLoading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Loading stations...</div>
                </div>
            </div>
        </div>

        <!-- Detail View -->
        <div id="detailView" class="detail-panel">
            <div class="detail-back" onclick="showList()">← Back</div>
            <div class="detail-content" id="detailContent"></div>
            <button class="navigate-btn" id="navigateBtn" onclick="startNavigation()" disabled>
                🧭 Start Navigation
            </button>
        </div>

        <!-- Navigation Panel -->
        <div id="navPanel" class="nav-panel">
            <div class="nav-header">
                <div class="nav-header-top">
                    <div class="nav-title">🧭 Navigation</div>
                    <button class="nav-end-btn" onclick="endNavigation()">✕ End</button>
                </div>
                <div class="nav-destination" id="navDestination"></div>
                <div class="nav-summary">
                    <span>🕐 <strong id="navDuration">—</strong></span>
                    <span>📍 <strong id="navDistance">—</strong></span>
                </div>
            </div>
            <div class="nav-steps" id="navSteps"></div>
        </div>

        <!-- Reservation View -->
        <div id="reservationView" class="reservation-view">
            <div class="detail-back" id="resBackBtn" onclick="backFromReservation()">← Back</div>
            <div class="detail-content" id="reservationContent"></div>
        </div>

    </div>

    <!-- Map -->
    <div style="position:relative; flex:1; overflow:hidden;">
        <div id="map" style="width:100%; height:100%;"></div>
        <div class="loading-overlay" id="mapLoading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading map...</div>
        </div>
        <div class="map-type-toggle">
            <button class="map-type-btn active" id="btn-roadmap" onclick="setMapType('roadmap', this)">🗺️ Roadmap</button>
            <button class="map-type-btn" id="btn-satellite" onclick="setMapType('satellite', this)">🛰️ Satellite</button>
            <button class="map-type-btn" id="btn-hybrid" onclick="setMapType('hybrid', this)">🌍 Hybrid</button>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    const API_BASE = 'http://127.0.0.1:8000/api/navigation';

    let map, userMarker, directionsRenderer, distanceService;
    let stations = [], filteredStations = [], allStations = [];
    let selectedStation = null;
    let currentFilter = 'all';
    let selectedRouteIndex = 0;
    let currentRoutes = [];
    let currentTravelMode = 'DRIVING';
    let userLocation = null;

    // Reservation state
    let reservationPill = null;
    let currentChargers = [];
    let selectedCharger = null;

    // Vehicle state — received from parent React app via postMessage
    let userVehicles = [];
    let selectedVehicle = null;

    // Reservation flow step: 'vehicle' | 'charger'
    let resStep = 'vehicle';

    const STATUS_LABELS = {
        available:   'Available',
        occupied:    'Occupied',
        offline:     'Offline',
        maintenance: 'Maintenance'
    };

    const STATUS_COLORS = {
        available:   '#00ff9d',
        occupied:    '#ffb800',
        offline:     '#ff3b5c',
        maintenance: '#a855f7'
    };

    // ── Listen for messages from parent React app ─────────────────────────────
    window.addEventListener('message', (e) => {
        if (e.data?.type === 'SET_VEHICLES') {
            userVehicles = e.data.vehicles || [];
        }
    });

    // ── Google Maps init ──────────────────────────────────────────────────────
    function initMap() {
        document.getElementById('mapLoading').style.display = 'none';

        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 38.4192, lng: 27.1287 },
            zoom: 12,
            styles: darkMapStyle(),
            disableDefaultUI: false,
            zoomControl: true,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: false,
        });

        directionsRenderer = new google.maps.DirectionsRenderer({
            map,
            suppressMarkers: false,
            polylineOptions: { strokeColor: '#00e5ff', strokeWeight: 4, strokeOpacity: 0.85 }
        });

        distanceService = new google.maps.DistanceMatrixService();

        map.addListener('click', () => {
            if (reservationPill) reservationPill.close();
        });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                userMarker = new google.maps.Marker({
                    position: userLocation,
                    map,
                    title: 'Your Location',
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 9,
                        fillColor: '#00e5ff',
                        fillOpacity: 1,
                        strokeColor: '#ffffff',
                        strokeWeight: 2.5
                    },
                    zIndex: 999
                });
                map.setCenter(userLocation);
            }, () => showToast('Could not get location'));
        }

        loadStations();
    }

    // ── Load stations ─────────────────────────────────────────────────────────
    async function loadStations() {
        try {
            const res = await fetch(`${API_BASE}/stations`);
            if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
            const data = await res.json();

            allStations = Array.isArray(data) ? data : [];
            stations = [...allStations];
            filteredStations = [...allStations];

            document.getElementById('listLoading').style.display = 'none';
            renderStationList();
            placeMarkers();
        } catch (e) {
            console.error('Fetch error:', e);
            document.getElementById('listLoading').style.display = 'none';
            document.getElementById('stationList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-text">Could not connect to API.<br>Check connection path.</div>
                </div>`;
        }
    }

    // ── Render station list ───────────────────────────────────────────────────
    function renderStationList() {
        const list = document.getElementById('stationList');
        if (!filteredStations.length) {
            list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔌</div><div class="empty-text">No stations found.</div></div>`;
            return;
        }

        list.innerHTML = filteredStations.map(s => {
            const label = STATUS_LABELS[s.status] || s.status;
            const id = s.id || s.stationID;
            return `
            <div class="station-card ${s.status}" id="card-${id}" onclick="selectStation(${id})">
                <div class="station-card-top">
                    <div class="station-name">${s.name}</div>
                    <span class="station-badge badge-${s.status}">${label}</span>
                </div>
                <div class="station-location">📍 ${s.location}</div>
                <div class="station-meta">
                    <span class="meta-item">🌍 ${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</span>
                </div>
            </div>`;
        }).join('');
    }

    // ── Place markers ─────────────────────────────────────────────────────────
    let markers = [];

    function placeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];

        allStations.forEach(s => {
            const color = STATUS_COLORS[s.status] || '#888';
            const marker = new google.maps.Marker({
                position: { lat: s.latitude, lng: s.longitude },
                map,
                title: s.name,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 11,
                    fillColor: color,
                    fillOpacity: 0.95,
                    strokeColor: '#0a0f1e',
                    strokeWeight: 2.5
                }
            });
            const id = s.id || s.stationID;
            marker.addListener('click', () => markerClick(id));
            markers.push(marker);
        });
    }

    // ── Marker click ──────────────────────────────────────────────────────────
    function markerClick(id) {
        const station = allStations.find(s => (s.id || s.stationID) === id);
        if (!station) return;

        selectedStation = station;
        currentChargers = [];
        selectedCharger = null;

        map.setCenter({ lat: station.latitude, lng: station.longitude });
        map.setZoom(15);

        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('selected'));
        const card = document.getElementById(`card-${id}`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        preloadChargers(id);

        if (reservationPill) reservationPill.close();
        reservationPill = new google.maps.InfoWindow({
            content: `<div class="map-reservation-pill" onclick="openReservationPanel()">📅 Make Reservation</div>`,
            position: { lat: station.latitude, lng: station.longitude },
            disableAutoPan: true,
            pixelOffset: new google.maps.Size(0, -32)
        });
        reservationPill.open(map);
    }

    // ── Preload chargers ──────────────────────────────────────────────────────
    async function preloadChargers(stationId) {
        try {
            const res = await fetch(`${API_BASE}/stations/${stationId}`);
            const data = await res.json();
            currentChargers = data.chargers || [];
        } catch {
            currentChargers = [];
        }
    }

    // ── Select station from list ──────────────────────────────────────────────
    async function selectStation(id) {
        selectedStation = allStations.find(s => (s.id || s.stationID) === id);
        if (!selectedStation) return;

        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('selected'));
        const card = document.getElementById(`card-${id}`);
        if (card) card.classList.add('selected');

        map.setCenter({ lat: selectedStation.latitude, lng: selectedStation.longitude });
        map.setZoom(14);

        if (reservationPill) reservationPill.close();
        reservationPill = new google.maps.InfoWindow({
            content: `<div class="map-reservation-pill" onclick="openReservationPanel()">📅 Make Reservation</div>`,
            position: { lat: selectedStation.latitude, lng: selectedStation.longitude },
            disableAutoPan: true,
            pixelOffset: new google.maps.Size(0, -32)
        });
        reservationPill.open(map);

        preloadChargers(id);
        showDetail(selectedStation);
        if (userLocation) await calculateRoutes(currentTravelMode);
    }

    // ── Show detail panel ─────────────────────────────────────────────────────
    function showDetail(station) {
        document.getElementById('listView').style.display = 'none';
        document.getElementById('reservationView').style.display = 'none';
        document.getElementById('navPanel').classList.remove('active');
        document.getElementById('detailView').classList.add('active');

        const label = STATUS_LABELS[station.status] || station.status;
        const id = station.id || station.stationID;

        document.getElementById('detailContent').innerHTML = `
            <div class="detail-station-name">${station.name}</div>
            <div class="detail-location">📍 ${station.location}</div>
            <span class="station-badge badge-${station.status}">${label}</span>

            <div class="section-label">Transport Mode</div>
            <div class="travel-modes">
                <button class="travel-mode-btn active" id="mode-DRIVING" onclick="changeTravelMode('DRIVING', this)" title="Driving">🚗</button>
                <button class="travel-mode-btn" id="mode-WALKING" onclick="changeTravelMode('WALKING', this)" title="Walking">🚶</button>
                <button class="travel-mode-btn" id="mode-TRANSIT" onclick="changeTravelMode('TRANSIT', this)" title="Transit">🚌</button>
            </div>

            <div class="section-label">Route Options</div>
            <div id="routeOptions">
                ${!userLocation
                    ? '<div style="font-size:12px;color:var(--text-muted);">Location access denied.</div>'
                    : '<div style="font-size:12px;color:var(--text-muted);">Calculating...</div>'}
            </div>

            <div class="section-label">Chargers</div>
            <div id="chargerList">
                <div style="font-size:12px;color:var(--text-muted);">Loading...</div>
            </div>
        `;

        loadChargers(id);
    }

    // ── Load chargers for detail view ─────────────────────────────────────────
    async function loadChargers(stationId) {
        try {
            const res = await fetch(`${API_BASE}/stations/${stationId}`);
            const data = await res.json();
            const chargers = data.chargers || [];
            currentChargers = chargers;

            const el = document.getElementById('chargerList');
            if (!el) return;

            if (!chargers.length) {
                el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">No charger info available.</div>';
                return;
            }

            el.innerHTML = chargers.map(c => {
                const cid = c.id || c.chargerID;
                const statusLabel = STATUS_LABELS[c.status] || c.status;
                const statusColor = c.status === 'available' ? 'var(--green)'
                    : c.status === 'occupied' ? 'var(--yellow)'
                    : c.status === 'maintenance' ? 'var(--purple)'
                    : 'var(--red)';
                return `
                <div class="charger-item">
                    <div>
                        <div class="charger-type">${c.connectorType} · ${c.powerOutput} kW</div>
                        <div class="charger-detail" style="color:${statusColor};">
                            Unit #${cid} · ${statusLabel}
                        </div>
                    </div>
                    <div class="charger-price">${c.pricePerKwh ?? '—'} ₺/kWh</div>
                </div>`;
            }).join('');
        } catch {
            const el = document.getElementById('chargerList');
            if (el) el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Could not get charger info.</div>';
        }
    }

    // ── Open reservation panel ────────────────────────────────────────────────
    async function openReservationPanel() {
        if (!selectedStation) return;
        if (reservationPill) reservationPill.close();

        selectedCharger = null;
        selectedVehicle = null;
        resStep = 'vehicle';

        document.getElementById('listView').style.display = 'none';
        document.getElementById('detailView').classList.remove('active');
        document.getElementById('navPanel').classList.remove('active');
        document.getElementById('reservationView').style.display = 'flex';

        // Fetch chargers if not cached
        if (!currentChargers.length) {
            const id = selectedStation.id || selectedStation.stationID;
            try {
                const res = await fetch(`${API_BASE}/stations/${id}`);
                const data = await res.json();
                currentChargers = data.chargers || [];
            } catch {
                currentChargers = [];
            }
        }

        renderVehicleStep();
    }

    // ── Step 1: Vehicle selection ─────────────────────────────────────────────
    function renderVehicleStep() {
        const label = STATUS_LABELS[selectedStation.status] || selectedStation.status;

        document.getElementById('reservationContent').innerHTML = `
            <div class="detail-station-name">${selectedStation.name}</div>
            <div class="detail-location">📍 ${selectedStation.location}</div>
            <span class="station-badge badge-${selectedStation.status}" style="display:inline-block; margin-bottom:16px;">${label}</span>

            <div class="section-label">Step 1 of 2 — Select Your Vehicle</div>

            <div id="vehicleList">
                ${renderVehicleCards()}
            </div>

            <button class="continue-btn" id="continueToChargerBtn" onclick="goToChargerStep()" disabled>
                Continue →
            </button>
        `;
    }

    function renderVehicleCards() {
        if (!userVehicles.length) {
            return `<div class="empty-state">
                <div class="empty-icon">🚗</div>
                <div class="empty-text">No vehicles found.<br>Add a vehicle from the sidebar first.</div>
            </div>`;
        }

        return userVehicles.map(v => `
            <div class="vehicle-card" id="vcard-${v.vehicleID}" onclick="selectVehicle(${v.vehicleID})">
                <div>
                    <div class="vehicle-card-name">${v.brand} ${v.model}</div>
                    <div class="vehicle-card-detail">${v.plateNumber} · ${v.batteryCapacity} kWh</div>
                </div>
                <span class="vehicle-connector-badge">${v.connectorType}</span>
            </div>
        `).join('');
    }

    function selectVehicle(vehicleId) {
        selectedVehicle = userVehicles.find(v => v.vehicleID === vehicleId);
        if (!selectedVehicle) return;

        document.querySelectorAll('.vehicle-card').forEach(el => el.classList.remove('selected'));
        const card = document.getElementById(`vcard-${vehicleId}`);
        if (card) card.classList.add('selected');

        const btn = document.getElementById('continueToChargerBtn');
        if (btn) btn.disabled = false;
    }

    // ── Step 2: Charger selection (filtered by vehicle connector type) ─────────
    function goToChargerStep() {
        if (!selectedVehicle) return;
        resStep = 'charger';
        selectedCharger = null;

        const label = STATUS_LABELS[selectedStation.status] || selectedStation.status;

        document.getElementById('reservationContent').innerHTML = `
            <div class="detail-station-name">${selectedStation.name}</div>
            <div class="detail-location">📍 ${selectedStation.location}</div>
            <span class="station-badge badge-${selectedStation.status}" style="display:inline-block; margin-bottom:8px;">${label}</span>

            <div class="selected-vehicle-banner">
                🚗 ${selectedVehicle.brand} ${selectedVehicle.model} · ${selectedVehicle.connectorType}
            </div>

            <div class="section-label">Step 2 of 2 — Select Charger</div>
            <div style="font-size:11px; color:var(--text-muted); margin-bottom:10px;">
                Showing compatible chargers for <strong style="color:var(--accent)">${selectedVehicle.connectorType}</strong>
            </div>

            <div id="resChargerList"></div>

            <div id="resForm" style="display:none;">
                <div class="res-form-section">
                    <div id="selectedChargerBanner" class="selected-charger-banner"></div>

                    <div class="res-field">
                        <label>How long do you want to charge?</label>
                        <select id="hoursSelect" onchange="calculateCost()">
                            <option value="">Select...</option>
                            <option value="0.5">30 mins</option>
                            <option value="1">1 hour</option>
                            <option value="1.5">1.5 hours</option>
                            <option value="2">2 hours (max)</option>
                        </select>
                    </div>

                    <div class="res-field">
                        <label>Appointment Time</label>
                        <input type="datetime-local" id="reservationTime" onchange="calculateCost()">
                    </div>

                    <div id="costDisplay" style="display:none;">
                        <div class="cost-box">
                            <div class="cost-label">Estimated Cost</div>
                            <div class="cost-amount" id="costAmount">—</div>
                            <div class="cost-detail" id="costDetail">—</div>
                        </div>
                    </div>

                    <button class="pay-btn" id="payBtn" onclick="proceedToPayment()" disabled>
                        💳 Proceed to Payment
                    </button>
                </div>
            </div>
        `;

        renderResChargerList();
    }

    // ── Render charger list filtered by vehicle connector type ────────────────
    function renderResChargerList() {
        const el = document.getElementById('resChargerList');
        if (!el) return;

        if (!currentChargers.length) {
            el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">No charger found at this station.</div>';
            return;
        }

        const vehicleConnector = selectedVehicle?.connectorType || '';

        el.innerHTML = currentChargers.map(c => {
            const cid = c.id || c.chargerID;
            const isCompatible = !vehicleConnector || c.connectorType === vehicleConnector;
            const isAvailable = c.status === 'available';
            // Charger is selectable only if compatible AND available
            const isSelectable = isCompatible && isAvailable;
            // Dimmed if incompatible OR unavailable
            const isDimmed = !isSelectable;

            const statusLabel = STATUS_LABELS[c.status] || c.status;
            const statusColor = isAvailable ? 'var(--green)'
                : c.status === 'occupied' ? 'var(--yellow)'
                : c.status === 'maintenance' ? 'var(--purple)'
                : 'var(--red)';

            // Tooltip explains why it's unavailable
            let tooltip = '';
            if (!isCompatible) tooltip = `Incompatible with your ${vehicleConnector}`;
            else if (!isAvailable) tooltip = `This unit is currently ${statusLabel.toLowerCase()}`;

            return `
            <div class="res-charger-card ${isDimmed ? 'unavailable' : ''}"
                 id="res-charger-${cid}"
                 ${isSelectable ? `onclick="selectCharger(${cid})"` : `title="${tooltip}"`}>
                <div>
                    <div class="charger-type">${c.connectorType} · ${c.powerOutput} kW
                        ${!isCompatible ? '<span style="font-size:10px;color:var(--danger);margin-left:6px;">✗ incompatible</span>' : ''}
                    </div>
                    <div class="charger-detail" style="color:${statusColor}; margin-top:3px;">
                        Unit #${cid} · ${statusLabel}
                    </div>
                </div>
                <div class="charger-price">${c.pricePerKwh ?? '—'} ₺/kWh</div>
            </div>`;
        }).join('');
    }

    // ── Select charger ────────────────────────────────────────────────────────
    function selectCharger(chargerId) {
        selectedCharger = currentChargers.find(c => (c.id || c.chargerID) === chargerId);
        if (!selectedCharger || selectedCharger.status !== 'available') return;

        const cid = selectedCharger.id || selectedCharger.chargerID;

        document.querySelectorAll('.res-charger-card').forEach(el => el.classList.remove('selected'));
        const card = document.getElementById(`res-charger-${cid}`);
        if (card) card.classList.add('selected');

        document.getElementById('selectedChargerBanner').innerHTML =
            `⚡ ${selectedCharger.connectorType} · ${selectedCharger.powerOutput} kW · ${selectedCharger.pricePerKwh} ₺/kWh`;

        const resForm = document.getElementById('resForm');
        resForm.style.display = 'block';
        document.getElementById('hoursSelect').value = '';
        document.getElementById('reservationTime').value = '';
        document.getElementById('costDisplay').style.display = 'none';
        document.getElementById('payBtn').disabled = true;

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('reservationTime').min = now.toISOString().slice(0, 16);

        resForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Calculate cost ────────────────────────────────────────────────────────
    function calculateCost() {
        if (!selectedCharger) return;

        const hours = parseFloat(document.getElementById('hoursSelect').value);
        const time = document.getElementById('reservationTime').value;

        if (!hours || !time) {
            document.getElementById('costDisplay').style.display = 'none';
            document.getElementById('payBtn').disabled = true;
            return;
        }

        const energyKwh = selectedCharger.powerOutput * hours;
        const cost = energyKwh * selectedCharger.pricePerKwh;

        document.getElementById('costAmount').textContent =
            `${new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(cost)} ₺`;
        document.getElementById('costDetail').textContent =
            `${selectedCharger.powerOutput} kW × ${hours} hr = ${energyKwh.toFixed(1)} kWh\n` +
            `${energyKwh.toFixed(1)} kWh × ${selectedCharger.pricePerKwh} ₺/kWh`;
        document.getElementById('costDisplay').style.display = 'block';
        document.getElementById('payBtn').disabled = false;
    }

    // ── Proceed to payment ────────────────────────────────────────────────────
    function proceedToPayment() {
        if (!selectedStation || !selectedCharger) return;

        const hours = parseFloat(document.getElementById('hoursSelect').value);
        const reservationTimeVal = document.getElementById('reservationTime').value;

        if (!hours || !reservationTimeVal) {
            showToast('Please fill all fields.');
            return;
        }

        const startTime = new Date(reservationTimeVal).toISOString();
        const endTime = new Date(new Date(reservationTimeVal).getTime() + hours * 3600000).toISOString();
        const costText = document.getElementById('costAmount').textContent;

        // Send data to parent React app — includes selected vehicle for API call
        window.parent.postMessage({
            type: 'OPEN_RESERVATION',
            stationId: selectedStation.id || selectedStation.stationID,
            stationName: selectedStation.name,
            charger: selectedCharger,
            vehicleId: selectedVehicle.vehicleID,  // pre-selected vehicle
            startTime,
            endTime,
            hours,
            estimatedCost: costText
        }, '*');

        showToast('Confirming reservation...');
    }

    // ── Back from reservation ─────────────────────────────────────────────────
    function backFromReservation() {
        if (resStep === 'charger') {
            // Go back to vehicle selection step
            resStep = 'vehicle';
            selectedCharger = null;
            renderVehicleStep();
            // Re-select previously chosen vehicle
            if (selectedVehicle) {
                const card = document.getElementById(`vcard-${selectedVehicle.vehicleID}`);
                if (card) {
                    card.classList.add('selected');
                    const btn = document.getElementById('continueToChargerBtn');
                    if (btn) btn.disabled = false;
                }
            }
            return;
        }

        // Back from vehicle step → detail or list
        if (reservationPill) reservationPill.close();
        document.getElementById('reservationView').style.display = 'none';
        selectedCharger = null;
        selectedVehicle = null;

        if (selectedStation) {
            showDetail(selectedStation);
            if (userLocation) calculateRoutes(currentTravelMode);
        } else {
            showList();
        }
    }

    // ── Calculate routes ──────────────────────────────────────────────────────
    async function calculateRoutes(mode) {
        if (!userLocation || !selectedStation) return;

        const directionsService = new google.maps.DirectionsService();
        directionsService.route({
            origin: userLocation,
            destination: { lat: selectedStation.latitude, lng: selectedStation.longitude },
            travelMode: google.maps.TravelMode[mode],
            provideRouteAlternatives: true
        }, (result, status) => {
            if (status === 'OK') {
                currentRoutes = result.routes;
                renderRouteOptions(result.routes);
                directionsRenderer.setDirections(result);
                directionsRenderer.setRouteIndex(0);
                selectedRouteIndex = 0;
                document.getElementById('navigateBtn').disabled = false;
            } else {
                const el = document.getElementById('routeOptions');
                if (el) el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Route not found.</div>';
            }
        });
    }

    function renderRouteOptions(routes) {
        const el = document.getElementById('routeOptions');
        if (!el) return;

        const seen = new Set();
        const unique = routes.filter(r => {
            const key = r.legs[0].duration.value;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
        unique.sort((a, b) => a.legs[0].duration.value - b.legs[0].duration.value);

        el.innerHTML = unique.map((r, i) => `
            <div class="route-option ${i === 0 ? 'selected' : ''}" onclick="selectRoute(${i}, this)">
                <div class="route-info">
                    <div class="route-duration">${r.legs[0].duration.text}</div>
                    <div class="route-distance">${r.legs[0].distance.text}</div>
                </div>
                <span class="route-badge">${i === 0 ? 'FASTEST' : 'ALT. ' + i}</span>
            </div>`).join('');
    }

    function selectRoute(index, el) {
        selectedRouteIndex = index;
        document.querySelectorAll('.route-option').forEach((r, i) => {
            r.classList.toggle('selected', i === index);
            r.querySelector('.route-badge').textContent = i === 0 ? 'FASTEST' : (i === index ? 'SELECTED' : `ALT. ${i}`);
        });
        directionsRenderer.setRouteIndex(index);
    }

    function changeTravelMode(mode, btn) {
        currentTravelMode = mode;
        document.querySelectorAll('.travel-mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        directionsRenderer.setDirections({ routes: [] });
        const el = document.getElementById('routeOptions');
        if (el) el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Calculating...</div>';
        calculateRoutes(mode);
    }

    function startNavigation() {
        if (!selectedStation || !currentRoutes.length) return;

        const route = currentRoutes[selectedRouteIndex];
        const leg = route.legs[0];

        document.getElementById('navDestination').textContent = selectedStation.name;
        document.getElementById('navDuration').textContent = leg.duration.text;
        document.getElementById('navDistance').textContent = leg.distance.text;

        const stepsEl = document.getElementById('navSteps');
        stepsEl.innerHTML = leg.steps.map((step, i) => {
            const instruction = step.instructions.replace(/<[^>]*>/g, '');
            return `
            <div class="nav-step ${i === 0 ? 'current' : ''}" id="step-${i}">
                <div class="step-icon">${getStepIcon(instruction)}</div>
                <div class="step-body">
                    <div class="step-instruction">${instruction}</div>
                    <div class="step-distance">${step.distance.text} · ${step.duration.text}</div>
                </div>
            </div>`;
        }).join('') + `
            <div class="nav-step" style="border-color:var(--accent2); background:rgba(0,255,157,0.05);">
                <div class="step-icon">⚡</div>
                <div class="step-body">
                    <div class="step-instruction">${selectedStation.name} — Destination</div>
                    <div class="step-distance">${leg.distance.text} total</div>
                </div>
            </div>`;

        document.getElementById('detailView').classList.remove('active');
        document.getElementById('navPanel').classList.add('active');
        showToast('Navigation started!');
    }

    function getStepIcon(instruction) {
        const t = instruction.toLowerCase();
        if (t.includes('sağa') || t.includes('right')) return '↱';
        if (t.includes('sola') || t.includes('left')) return '↰';
        if (t.includes('düz') || t.includes('straight') || t.includes('continue')) return '↑';
        if (t.includes('roundabout') || t.includes('dönel')) return '↻';
        if (t.includes('u-turn') || t.includes('geri')) return '↩';
        if (t.includes('dest') || t.includes('hedef') || t.includes('arrive')) return '⚡';
        return '→';
    }

    function endNavigation() {
        document.getElementById('navPanel').classList.remove('active');
        document.getElementById('detailView').classList.add('active');
        showToast('Navigation ended.');
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function filterStations() { applyFilters(); }

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        filteredStations = allStations.filter(s => {
            const matchStatus = currentFilter === 'all' || s.status === currentFilter;
            const matchSearch = !q || s.name.toLowerCase().includes(q) || s.location.toLowerCase().includes(q);
            return matchStatus && matchSearch;
        });
        renderStationList();
    }

    function showList() {
        if (reservationPill) reservationPill.close();
        document.getElementById('listView').style.display = 'flex';
        document.getElementById('detailView').classList.remove('active');
        document.getElementById('navPanel').classList.remove('active');
        document.getElementById('reservationView').style.display = 'none';
        directionsRenderer.setDirections({ routes: [] });
        selectedStation = null;
        selectedCharger = null;
        selectedVehicle = null;
        currentChargers = [];
        document.getElementById('navigateBtn').disabled = true;
    }

    function setMapType(type, btn) {
        map.setMapTypeId(type);
        document.querySelectorAll('.map-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        map.setOptions({ styles: type === 'roadmap' ? darkMapStyle() : [] });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    function darkMapStyle() {
        return [
            { elementType: 'geometry', stylers: [{ color: '#0a0f1e' }] },
            { elementType: 'labels.text.fill', stylers: [{ color: '#6b7fa3' }] },
            { elementType: 'labels.text.stroke', stylers: [{ color: '#0a0f1e' }] },
            { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#1a2235' }] },
            { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#111827' }] },
            { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#1e2d45' }] },
            { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d1a2e' }] },
            { featureType: 'poi', stylers: [{ visibility: 'off' }] },
            { featureType: 'transit', stylers: [{ visibility: 'off' }] },
            { featureType: 'administrative', elementType: 'geometry', stylers: [{ color: '#1a2235' }] },
        ];
    }

    async function loadGoogleMaps() {
        try {
            const response = await fetch('http://localhost:8000/api/config');
            const config = await response.json();
            const apiKey = config.google_maps_api_key || '';
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap&libraries=places,geometry`;
            script.async = true;
            script.defer = true;
            document.body.appendChild(script);
        } catch (error) {
            console.error('API key could not be loaded:', error);
            document.getElementById('mapLoading').innerHTML = `
                <div style="text-align:center; color:var(--danger);">
                    <div style="font-size:28px; margin-bottom:12px;">⚠️</div>
                    <div style="font-family:'Space Mono',monospace; font-size:12px;">Backend connection failed.<br>Is localhost:8000 running?</div>
                </div>`;
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadGoogleMaps);
    } else {
        loadGoogleMaps();
    }
</script>

</body>
</html>
