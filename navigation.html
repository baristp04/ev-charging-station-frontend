<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging — Station Navigation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg:           #0a0f1e;
            --surface:      #111827;
            --surface2:     #1a2235;
            --border:       #1e2d45;
            --accent:       #00e5ff;
            --accent2:      #00ff9d;
            --warn:         #ffb800;
            --danger:       #ff3b5c;
            --text:         #e8f0fe;
            --text-muted:   #6b7fa3;
            --green:        #00ff9d;
            --yellow:       #ffb800;
            --red:          #ff3b5c;
            --purple:       #a855f7;
            --panel-width:  380px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ── Side Panel ── */
        .panel {
            width: var(--panel-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .panel.collapsed {
            width: 0;
            border-right: none;
        }

        /* ── Panel toggle button — hidden until map is ready ── */
        .panel-toggle {
            position: absolute;
            top: 50%;
            left: var(--panel-width);
            transform: translateY(-50%);
            z-index: 500;
            width: 20px;
            height: 52px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 14px;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s, opacity 0.3s;
            user-select: none;

            /* Hidden until the map finishes loading */
            opacity: 0;
            pointer-events: none;
        }

        /* Shown by JS once initMap() completes */
        .panel-toggle.ready {
            opacity: 1;
            pointer-events: auto;
        }

        .panel-toggle:hover { background: var(--surface2); }

        .panel-toggle.collapsed {
            left: 0;
            border-left: none;
            border-right: 1px solid var(--border);
            border-radius: 0 10px 10px 0;
        }

        .panel-toggle-arrow {
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1;
        }

        .panel-toggle.collapsed .panel-toggle-arrow { transform: rotate(180deg); }

        /* ── Panel inner sections ── */
        .panel-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .search-box { position: relative; }

        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: transparent;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .filter-tab.active,
        .filter-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 229, 255, 0.08);
        }

        .filter-tab.favorites-tab.active,
        .filter-tab.favorites-tab:hover {
            border-color: #FFD700;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.08);
        }

        .station-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .station-list::-webkit-scrollbar { width: 4px; }
        .station-list::-webkit-scrollbar-track { background: transparent; }
        .station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Station cards ── */
        .station-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .station-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 0 2px 2px 0;
            background: var(--border);
            transition: background 0.2s;
        }

        .station-card.available::before   { background: var(--green); }
        .station-card.occupied::before    { background: var(--yellow); }
        .station-card.offline::before     { background: var(--red); }
        .station-card.maintenance::before { background: var(--purple); }

        .station-card:hover,
        .station-card.selected {
            border-color: var(--accent);
            background: rgba(0, 229, 255, 0.05);
        }

        .station-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            padding-right: 32px;
        }

        .station-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }

        .station-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .badge-available   { background: rgba(0, 255, 157, 0.15); color: var(--green); }
        .badge-occupied    { background: rgba(255, 184, 0, 0.15); color: var(--yellow); }
        .badge-offline     { background: rgba(255, 59, 92, 0.15); color: var(--red); }
        .badge-maintenance { background: rgba(168, 85, 247, 0.15); color: var(--purple); }

        .station-location {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .station-meta {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .star-btn {
            position: absolute;
            right: 14px;
            top: 55%;
            transform: translateY(-50%);
            font-size: 20px;
            cursor: pointer;
            color: #555;
            transition: color 0.2s, transform 0.15s;
            user-select: none;
            line-height: 1;
            z-index: 1;
        }

        .star-btn:hover { transform: translateY(-50%) scale(1.25); }
        .star-btn.active { color: #FFD700; }

        /* ── Detail panel ── */
        .detail-panel {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .detail-panel.active { display: flex; }

        .detail-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .detail-back:hover { opacity: 0.7; }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .detail-content::-webkit-scrollbar { width: 4px; }
        .detail-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .detail-station-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detail-location {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-top: 16px;
        }

        /* ── Travel mode buttons ── */
        .travel-modes { display: flex; gap: 6px; margin-bottom: 4px; }

        .travel-mode-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
        }

        .travel-mode-btn.active,
        .travel-mode-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 229, 255, 0.08);
        }

        /* ── Route options ── */
        .route-option {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .route-option:hover,
        .route-option.selected {
            border-color: var(--accent);
            background: rgba(0, 229, 255, 0.05);
        }

        .route-option.selected .route-badge {
            background: rgba(0, 229, 255, 0.15);
            color: var(--accent);
        }

        .route-info { flex: 1; }

        .route-duration {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .route-distance {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .route-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--surface);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ── Navigate button ── */
        .navigate-btn {
            margin: 16px 20px;
            padding: 13px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #0a0f1e;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }

        .navigate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.3);
        }

        .navigate-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Charger items ── */
        .charger-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .charger-type  { font-size: 13px; font-weight: 500; }
        .charger-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .charger-price {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent2);
            font-family: 'Space Mono', monospace;
        }

        /* ── Map area ── */
        #map { flex: 1; position: relative; }

        /* ── Loading overlay (covers the map while Google Maps initialises) ── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            gap: 16px;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-icon  { font-size: 32px; margin-bottom: 10px; }
        .empty-text  { font-size: 13px; line-height: 1.5; }

        /* ── Map type toggle (top-right corner) ── */
        .map-type-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 9999;
            display: flex;
            gap: 4px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px;
            backdrop-filter: blur(8px);
        }

        .map-type-btn {
            padding: 6px 12px;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .map-type-btn.active {
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .map-type-btn:hover:not(.active) {
            color: var(--text);
            background: var(--surface2);
        }

        /* ── Toast notification ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 13px;
            color: var(--accent);
            z-index: 999;
            transition: transform 0.3s ease;
            font-family: 'Space Mono', monospace;
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Google Maps InfoWindow overrides ── */
        .gm-style .gm-style-iw-c {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
            border-radius: 999px !important;
            min-width: 0 !important;
        }
        .gm-style .gm-style-iw-d {
            overflow: visible !important;
            padding: 0 !important;
            border-radius: 999px !important;
        }
        .gm-style .gm-style-iw-tc { display: none !important; }
        .gm-style button.gm-ui-hover-effect { display: none !important; }
        .gm-style .gm-style-iw-chr { display: none !important; }

        /* ── Reservation pill shown on map marker ── */
        .map-reservation-pill {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0f1e;
            padding: 10px 24px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap;
            box-shadow: 0 4px 24px rgba(0, 229, 255, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            letter-spacing: 0.03em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .map-reservation-pill:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(0, 229, 255, 0.65);
        }

        /* ── Reservation flow panel ── */
        .reservation-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        /* ── Vehicle cards ── */
        .vehicle-card {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vehicle-card:hover { border-color: var(--accent); background: rgba(0, 229, 255, 0.05); }

        .vehicle-card.selected {
            border-color: var(--accent) !important;
            background: rgba(0, 229, 255, 0.1) !important;
            box-shadow: 0 0 0 1px var(--accent);
        }

        .vehicle-card-name   { font-size: 13px; font-weight: 600; color: var(--text); }
        .vehicle-card-detail { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

        .vehicle-connector-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 8px;
            background: rgba(0, 229, 255, 0.12);
            color: var(--accent);
            font-family: 'Space Mono', monospace;
        }

        /* ── Continue / Pay buttons ── */
        .continue-btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #0a0f1e;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
            margin-top: 8px;
        }

        .continue-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.3);
        }

        .continue-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Charger cards in reservation flow ── */
        .res-charger-card {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .res-charger-card:hover:not(.unavailable) {
            border-color: var(--accent);
            background: rgba(0, 229, 255, 0.05);
        }

        .res-charger-card.selected {
            border-color: var(--accent) !important;
            background: rgba(0, 229, 255, 0.1) !important;
            box-shadow: 0 0 0 1px var(--accent);
        }

        .res-charger-card.unavailable { opacity: 0.4; cursor: not-allowed; }

        /* ── Reservation form fields ── */
        .res-form-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .res-field { margin-bottom: 14px; }

        .res-field label {
            display: block;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 6px;
        }

        .res-field select,
        .res-field input[type="datetime-local"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            color-scheme: dark;
        }

        .res-field select:focus,
        .res-field input[type="datetime-local"]:focus { border-color: var(--accent); }

        /* ── Cost estimate box ── */
        .cost-box {
            background: rgba(0, 229, 255, 0.06);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            text-align: center;
        }

        .cost-label {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 8px;
        }

        .cost-amount {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            color: var(--accent2);
            margin-bottom: 6px;
        }

        .cost-detail { font-size: 11px; color: var(--text-muted); line-height: 1.6; }

        .pay-btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent2), #00c87a);
            border: none;
            color: #0a0f1e;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
            margin-top: 4px;
        }

        .pay-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 255, 157, 0.3);
        }

        .pay-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Selected item banners ── */
        .selected-charger-banner {
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selected-vehicle-banner {
            background: rgba(0, 255, 157, 0.08);
            border: 1px solid rgba(0, 255, 157, 0.25);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--accent2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── In-App Navigation panel ── */
        .nav-panel { display: none; flex-direction: column; height: 100%; }
        .nav-panel.active { display: flex; }

        .nav-header { padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }

        .nav-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .nav-destination { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }

        .nav-stop-btn {
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255, 59, 92, 0.15);
            border: 1px solid var(--red);
            color: var(--red);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .nav-stop-btn:hover { background: rgba(255, 59, 92, 0.25); }

        .nav-stats { display: flex; gap: 12px; }

        .nav-stat {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            flex: 1;
            text-align: center;
        }

        .nav-stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .nav-stat-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .nav-steps { flex: 1; overflow-y: auto; padding: 12px 16px; }
        .nav-steps::-webkit-scrollbar { width: 4px; }
        .nav-steps::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Turn-by-turn step items ── */
        .nav-step {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .nav-step:last-child { border-bottom: none; }

        .nav-step.active-step {
            background: rgba(0, 229, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin: 0 -10px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .nav-step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .nav-step.active-step .nav-step-icon {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--accent);
        }

        .nav-step-content { flex: 1; }
        .nav-step-instruction { font-size: 13px; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
        .nav-step.active-step .nav-step-instruction { color: var(--accent); font-weight: 600; }
        .nav-step-distance { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

        /* ── Current-step highlight card ── */
        .nav-current-step {
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .nav-current-icon { font-size: 28px; flex-shrink: 0; }
        .nav-current-text { flex: 1; }
        .nav-current-instruction { font-size: 14px; font-weight: 600; color: var(--accent); line-height: 1.4; margin-bottom: 3px; }
        .nav-current-dist  { font-size: 12px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

        /* ── Arrival banner ── */
        .nav-arrived-banner {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .nav-arrived-icon  { font-size: 36px; margin-bottom: 8px; }
        .nav-arrived-title { font-size: 18px; font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
        .nav-arrived-sub   { font-size: 12px; color: var(--text-muted); }

        .nav-mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>
<body>

<div class="main">

    <!-- ── Side Panel ── -->
    <div class="panel collapsed" id="sidePanel">

        <!-- Station list view -->
        <div id="listView" style="display:flex; flex-direction:column; height:100%;">
            <div class="panel-header">
                <div class="panel-title">Stations</div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search stations..." oninput="filterStations()">
                </div>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active"       onclick="setFilter('all', this)">All</button>
                <button class="filter-tab"              onclick="setFilter('available', this)">Available</button>
                <button class="filter-tab"              onclick="setFilter('occupied', this)">Occupied</button>
                <button class="filter-tab"              onclick="setFilter('offline', this)">Offline</button>
                <button class="filter-tab"              onclick="setFilter('maintenance', this)">Maintenance</button>
                <button class="filter-tab favorites-tab" onclick="setFilter('favorites', this)">⭐ Favorites</button>
            </div>
            <div class="station-list" id="stationList">
                <div class="loading-overlay" id="listLoading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Loading stations...</div>
                </div>
            </div>
        </div>

        <!-- Station detail view -->
        <div id="detailView" class="detail-panel">
            <div class="detail-back" onclick="showList()">← Back</div>
            <div class="detail-content" id="detailContent"></div>
            <button class="navigate-btn" id="navigateBtn" onclick="startNavigation()" disabled>
                🧭 Start Navigation
            </button>
        </div>

        <!-- Reservation flow view -->
        <div id="reservationView" class="reservation-view">
            <div class="detail-back" id="resBackBtn" onclick="backFromReservation()">← Back</div>
            <div class="detail-content" id="reservationContent"></div>
        </div>

        <!-- In-app navigation view -->
        <div id="navView" class="nav-panel">
            <div class="nav-header">
                <div class="nav-header-top">
                    <div id="navDestination" class="nav-destination">Navigating...</div>
                    <button class="nav-stop-btn" onclick="stopNavigation()">✕ Stop</button>
                </div>
                <div class="nav-stats">
                    <div class="nav-stat">
                        <div class="nav-stat-value" id="navEta">—</div>
                        <div class="nav-stat-label">ETA</div>
                    </div>
                    <div class="nav-stat">
                        <div class="nav-stat-value" id="navDuration">—</div>
                        <div class="nav-stat-label">Duration</div>
                    </div>
                    <div class="nav-stat">
                        <div class="nav-stat-value" id="navDistance">—</div>
                        <div class="nav-stat-label">Distance</div>
                    </div>
                </div>
            </div>
            <div class="nav-steps" id="navSteps"></div>
        </div>

    </div>

    <!-- ── Panel toggle — rendered but invisible until map is ready ── -->
    <div class="panel-toggle collapsed" id="panelToggle" onclick="togglePanel()">
        <span class="panel-toggle-arrow">‹</span>
    </div>

    <!-- ── Map area ── -->
    <div style="position:relative; flex:1; overflow:hidden;">
        <div id="map" style="width:100%; height:100%;"></div>

        <!-- Covers the map until Google Maps finishes initialising -->
        <div class="loading-overlay" id="mapLoading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading map...</div>
        </div>

        <div class="map-type-toggle">
            <button class="map-type-btn active" id="btn-roadmap"   onclick="setMapType('roadmap', this)">🗺️ Roadmap</button>
            <button class="map-type-btn"        id="btn-satellite" onclick="setMapType('satellite', this)">🛰️ Satellite</button>
            <button class="map-type-btn"        id="btn-hybrid"    onclick="setMapType('hybrid', this)">🌍 Hybrid</button>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    const API_BASE = 'http://127.0.0.1:8000/api/navigation';

    let map, userMarker;
    let directionsRenderer = null;

    let allStations      = [];
    let filteredStations = [];

    let selectedStation    = null;
    let currentFilter      = 'all';
    let currentTravelMode  = 'DRIVING';
    let currentRoutes      = [];
    let selectedRouteIndex = 0;
    let userLocation       = null;

    let reservationPill = null;
    let currentChargers = [];
    let selectedCharger = null;

    let userVehicles    = [];
    let selectedVehicle = null;

    let resStep     = 'vehicle';
    let favoriteIds = new Set();

    // Navigation state
    let navSteps       = [];
    let navStepIndex   = 0;
    let navSimInterval = null;
    let navRoute       = null;

    const STATUS_LABELS = {
        available:   'Available',
        occupied:    'Occupied',
        offline:     'Offline',
        maintenance: 'Maintenance'
    };

    const STATUS_COLORS = {
        available:   '#00ff9d',
        occupied:    '#ffb800',
        offline:     '#ff3b5c',
        maintenance: '#a855f7'
    };

    let currentDriverId = null;

    // ── Panel toggle ──────────────────────────────────────────────────────────
    function togglePanel() {
        const panel     = document.getElementById('sidePanel');
        const toggle    = document.getElementById('panelToggle');
        const collapsed = panel.classList.toggle('collapsed');
        toggle.classList.toggle('collapsed', collapsed);
        // Trigger map resize after CSS transition so tiles fill correctly
        setTimeout(() => {
            if (map) google.maps.event.trigger(map, 'resize');
        }, 360);
    }

    // ── postMessage listeners (from parent React app) ─────────────────────────
    window.addEventListener('message', (e) => {
        if (e.data?.type === 'SET_VEHICLES') {
            userVehicles = e.data.vehicles || [];
        }
        if (e.data?.type === 'SET_DRIVER') {
            currentDriverId = e.data.driverID || null;
            if (currentDriverId) loadFavorites();
        }
    });

    function getDriverId() { return currentDriverId; }

    // ── Favorites ─────────────────────────────────────────────────────────────
    async function loadFavorites() {
        const driverID = getDriverId();
        if (!driverID) return;
        try {
            const res = await fetch(`http://localhost:8000/api/favorites/${driverID}`);
            if (!res.ok) return;
            const data = await res.json();
            favoriteIds = new Set(data.map(s => s.stationID || s.id));
        } catch (e) {
            console.error('Could not load favorites:', e);
        }
    }

    async function toggleFavorite(stationId, event) {
        event.stopPropagation();
        const driverID = getDriverId();
        if (!driverID) { showToast('Sign in to save favorites.'); return; }

        try {
            if (favoriteIds.has(stationId)) {
                const res = await fetch(
                    `http://localhost:8000/api/favorites/${driverID}/${stationId}`,
                    { method: 'DELETE' }
                );
                if (res.ok) { favoriteIds.delete(stationId); showToast('Removed from favorites.'); }
            } else {
                const res = await fetch('http://localhost:8000/api/favorites/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ driver_id: driverID, station_id: stationId })
                });
                if (res.ok) { favoriteIds.add(stationId); showToast('Added to favorites!'); }
            }
            applyFilters();
        } catch (e) {
            console.error('Favorite toggle failed:', e);
            showToast('Could not update favorites.');
        }
    }

    // ── Map initialisation ────────────────────────────────────────────────────
    function initMap() {
        // Hide the map loading overlay
        document.getElementById('mapLoading').style.display = 'none';

        // Show the panel toggle now that the map is ready
        document.getElementById('panelToggle').classList.add('ready');

        // Notify parent React app that the iframe is fully ready
        window.parent.postMessage({ type: 'MAP_READY' }, '*');

        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 38.4192, lng: 27.1287 },
            zoom: 12,
            styles: darkMapStyle(),
            disableDefaultUI: false,
            zoomControl: true,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: false,
        });

        map.addListener('click', () => {
            if (reservationPill) reservationPill.close();
        });

        // Request user's geolocation
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                userMarker = new google.maps.Marker({
                    position: userLocation,
                    map,
                    title: 'Your Location',
                    icon: {
                        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
                            <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
                                <circle cx="22" cy="22" r="10" fill="#00e5ff" stroke="#ffffff" stroke-width="2.5"/>
                                <rect x="8" y="34" width="28" height="14" rx="7" fill="#00e5ff"/>
                                <text x="22" y="44" text-anchor="middle" fill="#0a0f1e"
                                    font-size="8" font-weight="700" font-family="DM Sans, sans-serif">YOU</text>
                            </svg>
                        `),
                        scaledSize: new google.maps.Size(44, 48),
                        anchor: new google.maps.Point(22, 22)
                    },
                    zIndex: 999
                });
                map.setCenter(userLocation);
            }, () => showToast('Could not get location'));
        }

        loadStations();
    }

    // ── Directions renderer ───────────────────────────────────────────────────
    function createFreshRenderer() {
        if (directionsRenderer) {
            directionsRenderer.setMap(null);
            directionsRenderer = null;
        }
        directionsRenderer = new google.maps.DirectionsRenderer({
            map,
            suppressMarkers: false,
            polylineOptions: {
                strokeColor:   '#00e5ff',
                strokeWeight:  4,
                strokeOpacity: 0.85
            }
        });
    }

    // ── Station loading & rendering ───────────────────────────────────────────
    async function loadStations() {
        try {
            const res = await fetch(`${API_BASE}/stations`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            allStations      = Array.isArray(data) ? data : [];
            filteredStations = [...allStations];

            document.getElementById('listLoading').style.display = 'none';
            renderStationList();
            placeMarkers();
        } catch (e) {
            console.error('Station fetch error:', e);
            document.getElementById('listLoading').style.display = 'none';
            document.getElementById('stationList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-text">Could not connect to API.<br>Is the backend running?</div>
                </div>`;
        }
    }

    function renderStationList() {
        const list = document.getElementById('stationList');
        if (!filteredStations.length) {
            const emptyMsg = currentFilter === 'favorites'
                ? 'No favorite stations yet.<br>Click ★ on a station to save it.'
                : 'No stations found.';
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${currentFilter === 'favorites' ? '⭐' : '🔌'}</div>
                    <div class="empty-text">${emptyMsg}</div>
                </div>`;
            return;
        }

        list.innerHTML = filteredStations.map(s => {
            const id    = s.id || s.stationID;
            const label = STATUS_LABELS[s.status] || s.status;
            const isFav = favoriteIds.has(id);
            return `
            <div class="station-card ${s.status}" id="card-${id}" onclick="selectStation(${id})">
                <div class="station-card-top">
                    <div class="station-name">${s.name}</div>
                    <span class="station-badge badge-${s.status}">${label}</span>
                </div>
                <div class="station-location">📍 ${s.location}</div>
                <div class="station-meta">
                    <span>🌍 ${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</span>
                </div>
                <span class="star-btn ${isFav ? 'active' : ''}"
                    onclick="toggleFavorite(${id}, event)"
                    title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">★</span>
            </div>`;
        }).join('');
    }

    // ── Map markers ───────────────────────────────────────────────────────────
    let markers = [];

    function placeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];

        allStations.forEach(s => {
            const id    = s.id || s.stationID;
            const color = STATUS_COLORS[s.status] || '#888';
            const marker = new google.maps.Marker({
                position: { lat: s.latitude, lng: s.longitude },
                map,
                title: s.name,
                icon: {
                    path:          google.maps.SymbolPath.CIRCLE,
                    scale:         11,
                    fillColor:     color,
                    fillOpacity:   0.95,
                    strokeColor:   '#0a0f1e',
                    strokeWeight:  2.5
                }
            });
            marker.addListener('click', () => markerClick(id));
            markers.push(marker);
        });
    }

    // ── Marker click — opens detail + reservation pill ────────────────────────
    function markerClick(id) {
        const station = allStations.find(s => (s.id || s.stationID) === id);
        if (!station) return;

        selectedStation = station;
        currentChargers = [];
        selectedCharger = null;

        map.setCenter({ lat: station.latitude, lng: station.longitude });
        map.setZoom(15);

        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('selected'));
        const card = document.getElementById(`card-${id}`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        preloadChargers(id);

        if (reservationPill) reservationPill.close();
        reservationPill = new google.maps.InfoWindow({
            content:       `<div class="map-reservation-pill" onclick="openReservationPanel()">📅 Make Reservation</div>`,
            position:      { lat: station.latitude, lng: station.longitude },
            disableAutoPan: true,
            pixelOffset:   new google.maps.Size(0, -32)
        });
        reservationPill.open(map);

        showDetail(station);
        if (userLocation) calculateRoutes(currentTravelMode);
    }

    async function preloadChargers(stationId) {
        try {
            const res  = await fetch(`${API_BASE}/stations/${stationId}`);
            const data = await res.json();
            currentChargers = data.chargers || [];
        } catch {
            currentChargers = [];
        }
    }

    // ── Station card click ────────────────────────────────────────────────────
    async function selectStation(id) {
        selectedStation = allStations.find(s => (s.id || s.stationID) === id);
        if (!selectedStation) return;

        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('selected'));
        const card = document.getElementById(`card-${id}`);
        if (card) card.classList.add('selected');

        map.setCenter({ lat: selectedStation.latitude, lng: selectedStation.longitude });
        map.setZoom(14);

        if (reservationPill) reservationPill.close();
        reservationPill = new google.maps.InfoWindow({
            content:       `<div class="map-reservation-pill" onclick="openReservationPanel()">📅 Make Reservation</div>`,
            position:      { lat: selectedStation.latitude, lng: selectedStation.longitude },
            disableAutoPan: true,
            pixelOffset:   new google.maps.Size(0, -32)
        });
        reservationPill.open(map);

        preloadChargers(id);
        showDetail(selectedStation);
        if (userLocation) await calculateRoutes(currentTravelMode);
    }

    // ── Show station detail panel ─────────────────────────────────────────────
    function showDetail(station) {
        document.getElementById('listView').style.display        = 'none';
        document.getElementById('reservationView').style.display = 'none';
        document.getElementById('navView').classList.remove('active');
        document.getElementById('detailView').classList.add('active');

        const id    = station.id || station.stationID;
        const label = STATUS_LABELS[station.status] || station.status;

        document.getElementById('detailContent').innerHTML = `
            <div class="detail-station-name">${station.name}</div>
            <div class="detail-location">📍 ${station.location}</div>
            <span class="station-badge badge-${station.status}">${label}</span>

            <div class="section-label">Transport Mode</div>
            <div class="travel-modes">
                <button class="travel-mode-btn ${currentTravelMode === 'DRIVING' ? 'active' : ''}"
                    onclick="changeTravelMode('DRIVING', this)" title="Driving">🚗</button>
                <button class="travel-mode-btn ${currentTravelMode === 'WALKING' ? 'active' : ''}"
                    onclick="changeTravelMode('WALKING', this)" title="Walking">🚶</button>
                <button class="travel-mode-btn ${currentTravelMode === 'TRANSIT' ? 'active' : ''}"
                    onclick="changeTravelMode('TRANSIT', this)" title="Transit">🚌</button>
            </div>

            <div class="section-label">Route Options</div>
            <div id="routeOptions">
                ${!userLocation
                    ? '<div style="font-size:12px;color:var(--text-muted);">Location access denied.</div>'
                    : '<div style="font-size:12px;color:var(--text-muted);">Calculating...</div>'}
            </div>

            <div class="section-label">Chargers</div>
            <div id="chargerList">
                <div style="font-size:12px;color:var(--text-muted);">Loading...</div>
            </div>
        `;

        loadChargers(id);
    }

    async function loadChargers(stationId) {
        try {
            const res      = await fetch(`${API_BASE}/stations/${stationId}`);
            const data     = await res.json();
            const chargers = data.chargers || [];
            currentChargers = chargers;

            const el = document.getElementById('chargerList');
            if (!el) return;

            if (!chargers.length) {
                el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">No charger info available.</div>';
                return;
            }

            el.innerHTML = chargers.map(c => {
                const cid         = c.id || c.chargerID;
                const statusLabel = STATUS_LABELS[c.status] || c.status;
                const statusColor = c.status === 'available'   ? 'var(--green)'
                    : c.status === 'occupied'    ? 'var(--yellow)'
                    : c.status === 'maintenance' ? 'var(--purple)'
                    : 'var(--red)';
                return `
                <div class="charger-item">
                    <div>
                        <div class="charger-type">${c.connectorType} · ${c.powerOutput} kW</div>
                        <div class="charger-detail" style="color:${statusColor};">
                            Unit #${cid} · ${statusLabel}
                        </div>
                    </div>
                    <div class="charger-price">${c.pricePerKwh ?? '—'} ₺/kWh</div>
                </div>`;
            }).join('');
        } catch {
            const el = document.getElementById('chargerList');
            if (el) el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Could not load charger info.</div>';
        }
    }

    // ── Route calculation ─────────────────────────────────────────────────────
    async function calculateRoutes(mode) {
        if (!userLocation || !selectedStation) return;

        const travelMode = google.maps.TravelMode[mode];
        if (!travelMode) { console.error('Unknown travel mode:', mode); return; }

        createFreshRenderer();

        const wantAlternatives  = (mode === 'DRIVING');
        const directionsService = new google.maps.DirectionsService();

        directionsService.route(
            {
                origin:                   userLocation,
                destination:              { lat: selectedStation.latitude, lng: selectedStation.longitude },
                travelMode,
                provideRouteAlternatives: wantAlternatives,
                language:                 'en'
            },
            (result, status) => {
                if (status === google.maps.DirectionsStatus.OK) {
                    currentRoutes      = result.routes;
                    selectedRouteIndex = 0;
                    navRoute           = result;
                    renderRouteOptions(result.routes);
                    directionsRenderer.setDirections(result);
                    directionsRenderer.setRouteIndex(0);
                    document.getElementById('navigateBtn').disabled = false;
                } else {
                    currentRoutes = [];
                    navRoute      = null;
                    const el = document.getElementById('routeOptions');
                    if (el) {
                        el.innerHTML = `
                            <div style="font-size:12px;color:var(--text-muted);">
                                No route found for this mode.<br>
                                <span style="font-size:11px;">Try Driving or Transit instead.</span>
                            </div>`;
                    }
                    document.getElementById('navigateBtn').disabled = true;
                }
            }
        );
    }

    function formatDuration(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.round((seconds % 3600) / 60);
        if (h === 0) return `${m} min`;
        if (m === 0) return `${h} hr`;
        return `${h} hr ${m} min`;
    }

    function formatDistance(meters) {
        if (meters >= 1000) return `${(meters / 1000).toFixed(1)} km`;
        return `${meters} m`;
    }

    // Returns true if the route contains a ferry leg
    function routeHasFerry(route) {
        const steps = route.legs?.[0]?.steps || [];
        return steps.some(step => {
            const mode  = (step.travel_mode || '').toUpperCase();
            const instr = (step.instructions || step.html_instructions || '').toLowerCase();
            return (
                mode === 'FERRY'          ||
                instr.includes('ferry')   ||
                instr.includes('feribot') ||
                instr.includes('vapur')   ||
                instr.includes('boat')    ||
                instr.includes('gemi')
            );
        });
    }

    function renderRouteOptions(routes) {
        const el = document.getElementById('routeOptions');
        if (!el) return;

        // De-duplicate routes by duration and sort fastest first
        const seen   = new Set();
        const unique = routes.filter(r => {
            const key = r.legs[0].duration.value;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
        unique.sort((a, b) => a.legs[0].duration.value - b.legs[0].duration.value);

        const anyFerry    = unique.some(r => routeHasFerry(r));
        const ferryBanner = anyFerry ? `
            <div style="
                background:rgba(255,184,0,0.10);
                border:1px solid rgba(255,184,0,0.35);
                border-radius:8px;
                padding:9px 13px;
                margin-bottom:10px;
                font-size:11px;
                color:var(--yellow);
                display:flex;
                align-items:flex-start;
                gap:8px;
                line-height:1.5;">
                <span style="font-size:15px;flex-shrink:0;margin-top:1px;">&#x26F4;&#xFE0F;</span>
                <span>
                    This route includes a <strong>ferry crossing</strong>.
                    Use <em>Start Navigation</em> for full turn-by-turn directions.
                </span>
            </div>` : '';

        el.innerHTML = ferryBanner + unique.map((r, i) => {
            const hasFerry = routeHasFerry(r);
            const ferryTag = hasFerry
                ? ' <span style="font-size:10px;color:var(--yellow);margin-left:4px;">&#x26F4;&#xFE0F; ferry</span>'
                : '';
            return `
            <div class="route-option ${i === 0 ? 'selected' : ''}" onclick="selectRoute(${i}, this)">
                <div class="route-info">
                    <div class="route-duration">${formatDuration(r.legs[0].duration.value)}${ferryTag}</div>
                    <div class="route-distance">${formatDistance(r.legs[0].distance.value)}</div>
                </div>
                <span class="route-badge">${i === 0 ? 'FASTEST' : 'ALT. ' + i}</span>
            </div>`;
        }).join('');
    }

    function selectRoute(index) {
        selectedRouteIndex = index;
        document.querySelectorAll('.route-option').forEach((r, i) => {
            r.classList.toggle('selected', i === index);
            r.querySelector('.route-badge').textContent =
                i === 0 ? 'FASTEST' : (i === index ? 'SELECTED' : `ALT. ${i}`);
        });
        directionsRenderer.setRouteIndex(index);
    }

    function changeTravelMode(mode, btn) {
        currentTravelMode = mode;
        document.querySelectorAll('.travel-mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const el = document.getElementById('routeOptions');
        if (el) el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Calculating...</div>';
        document.getElementById('navigateBtn').disabled = true;
        calculateRoutes(mode);
    }

    // ── In-app navigation ─────────────────────────────────────────────────────
    function startNavigation() {
        if (!selectedStation) { showToast('No station selected.'); return; }
        if (!userLocation)    { showToast('Location not available.'); return; }
        if (!navRoute)        { showToast('No route calculated yet.'); return; }

        const route = navRoute.routes[selectedRouteIndex] || navRoute.routes[0];
        const leg   = route.legs[0];

        navSteps = leg.steps.map(step => ({
            instruction: stripHtml(step.html_instructions || step.instructions || ''),
            distance:    step.distance?.text || '',
            distanceVal: step.distance?.value || 0,
            mode:        step.travel_mode || currentTravelMode,
            endLat:      step.end_location?.lat() ?? null,
            endLng:      step.end_location?.lng() ?? null
        }));

        navStepIndex = 0;

        const durationSec = leg.duration.value;
        const etaDate     = new Date(Date.now() + durationSec * 1000);
        const etaStr      = etaDate.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

        document.getElementById('listView').style.display        = 'none';
        document.getElementById('detailView').classList.remove('active');
        document.getElementById('reservationView').style.display = 'none';
        document.getElementById('navView').classList.add('active');

        document.getElementById('navDestination').textContent = selectedStation.name;
        document.getElementById('navEta').textContent         = etaStr;
        document.getElementById('navDuration').textContent    = formatDuration(durationSec);
        document.getElementById('navDistance').textContent    = formatDistance(leg.distance.value);

        renderNavSteps();
        showToast('Navigation started!');

        // Watch real GPS position and advance steps automatically
        if (navSimInterval !== null) { navigator.geolocation.clearWatch(navSimInterval); navSimInterval = null; }
        navSimInterval = navigator.geolocation.watchPosition(pos => {
            userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            if (userMarker) userMarker.setPosition(userLocation);
            advanceStepIfNeeded();
        }, null, { enableHighAccuracy: true, maximumAge: 3000 });
    }

    // Advances to the next nav step when within 25 m of the step's end point
    function advanceStepIfNeeded() {
        if (!navSteps.length || navStepIndex >= navSteps.length) return;
        const step = navSteps[navStepIndex];
        if (!step || !step.endLat) return;

        const dist = haversineMeters(userLocation.lat, userLocation.lng, step.endLat, step.endLng);

        if (dist <= 25) {
            if (navStepIndex < navSteps.length - 1) {
                navStepIndex++;
                renderNavSteps();
            } else {
                if (navSimInterval !== null) { navigator.geolocation.clearWatch(navSimInterval); navSimInterval = null; }
                renderArrived();
            }
        }
    }

    function haversineMeters(lat1, lng1, lat2, lng2) {
        const R    = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a    = Math.sin(dLat / 2) ** 2 +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function stripHtml(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
    }

    function stepIcon(instruction) {
        const t = instruction.toLowerCase();
        if (t.includes('arrive') || t.includes('destination'))               return '🏁';
        if (t.includes('ferry') || t.includes('vapur') || t.includes('feribot')) return '⛴️';
        if (t.includes('bus') || t.includes('transit') || t.includes('otobüs')) return '🚌';
        if (t.includes('subway') || t.includes('metro'))                     return '🚇';
        if (t.includes('train') || t.includes('tren'))                       return '🚆';
        if (t.includes('right') || t.includes('sağ'))                        return '↪️';
        if (t.includes('left')  || t.includes('sol'))                        return '↩️';
        if (t.includes('u-turn') || t.includes('u dönüşü'))                  return '🔄';
        if (t.includes('roundabout') || t.includes('dönel'))                 return '🔵';
        if (t.includes('ramp') || t.includes('rampa'))                       return '↗️';
        if (t.includes('merge') || t.includes('birleş'))                     return '🔀';
        if (t.includes('walk') || t.includes('yürü'))                        return '🚶';
        return '⬆️';
    }

    function renderNavSteps() {
        const container = document.getElementById('navSteps');
        if (!container) return;

        let html = '';
        const current = navSteps[navStepIndex];
        if (current) {
            html += `
                <div class="nav-current-step">
                    <div class="nav-current-icon">${stepIcon(current.instruction)}</div>
                    <div class="nav-current-text">
                        <div class="nav-current-instruction">${current.instruction}</div>
                        <div class="nav-current-dist">${current.distance}</div>
                    </div>
                </div>`;
        }

        const modeLabel = { DRIVING: '🚗 Driving', WALKING: '🚶 Walking', TRANSIT: '🚌 Transit' };
        html += `<div style="margin-bottom:10px;"><span class="nav-mode-badge">${modeLabel[currentTravelMode] || currentTravelMode}</span></div>`;

        html += navSteps.map((step, i) => `
            <div class="nav-step ${i === navStepIndex ? 'active-step' : ''}">
                <div class="nav-step-icon">${i < navStepIndex ? '✓' : stepIcon(step.instruction)}</div>
                <div class="nav-step-content">
                    <div class="nav-step-instruction">${step.instruction}</div>
                    <div class="nav-step-distance">${step.distance}</div>
                </div>
            </div>`).join('');

        container.innerHTML = html;

        const activeEl = container.querySelector('.active-step');
        if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderArrived() {
        const container = document.getElementById('navSteps');
        if (!container) return;
        container.innerHTML = `
            <div class="nav-arrived-banner">
                <div class="nav-arrived-icon">🏁</div>
                <div class="nav-arrived-title">You have arrived!</div>
                <div class="nav-arrived-sub">${selectedStation?.name || 'Charging station'}</div>
            </div>
            <button class="navigate-btn" style="margin:0 0 12px;" onclick="stopNavigation()">
                ✕ End Navigation
            </button>`;
        showToast('You have arrived!');
    }

    function stopNavigation() {
        if (navSimInterval !== null) { navigator.geolocation.clearWatch(navSimInterval); navSimInterval = null; }
        navStepIndex = 0;
        navSteps     = [];
        document.getElementById('navView').classList.remove('active');
        if (selectedStation) {
            showDetail(selectedStation);
            if (userLocation) calculateRoutes(currentTravelMode);
        } else {
            showList();
        }
    }

    // ── Reservation flow ──────────────────────────────────────────────────────
    async function openReservationPanel() {
        if (!selectedStation) return;
        if (reservationPill) reservationPill.close();

        selectedCharger = null;
        selectedVehicle = null;
        resStep         = 'vehicle';

        document.getElementById('listView').style.display        = 'none';
        document.getElementById('detailView').classList.remove('active');
        document.getElementById('navView').classList.remove('active');
        document.getElementById('reservationView').style.display = 'flex';

        if (!currentChargers.length) {
            const id = selectedStation.id || selectedStation.stationID;
            try {
                const res  = await fetch(`${API_BASE}/stations/${id}`);
                const data = await res.json();
                currentChargers = data.chargers || [];
            } catch { currentChargers = []; }
        }

        renderVehicleStep();
    }

    function renderVehicleStep() {
        const label = STATUS_LABELS[selectedStation.status] || selectedStation.status;
        document.getElementById('reservationContent').innerHTML = `
            <div class="detail-station-name">${selectedStation.name}</div>
            <div class="detail-location">📍 ${selectedStation.location}</div>
            <span class="station-badge badge-${selectedStation.status}"
                  style="display:inline-block;margin-bottom:16px;">${label}</span>

            <div class="section-label">Step 1 of 2 — Select Your Vehicle</div>
            <div id="vehicleList">${renderVehicleCards()}</div>

            <button class="continue-btn" id="continueToChargerBtn" onclick="goToChargerStep()" disabled>
                Continue →
            </button>
        `;
    }

    function renderVehicleCards() {
        if (!userVehicles.length) {
            return `<div class="empty-state">
                <div class="empty-icon">🚗</div>
                <div class="empty-text">No vehicles found.<br>Add a vehicle from the sidebar first.</div>
            </div>`;
        }
        return userVehicles.map(v => `
            <div class="vehicle-card" id="vcard-${v.vehicleID}" onclick="selectVehicle(${v.vehicleID})">
                <div>
                    <div class="vehicle-card-name">${v.brand} ${v.model}</div>

                </div>

            </div>
